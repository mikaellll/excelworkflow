site:
  name: ExcelWorkflow
  site: 'https://excelworkflow.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null

# Default SEO metadata
metadata:
  title:
    default: ExcelWorkflow — Maîtrisez Excel IA, Python & Power BI
    template: '%s — ExcelWorkflow'
  description: "Formations expertes en Excel avec IA, Python Data Science, Power BI et DAX. Automatisez vos données, créez des dashboards puissants et boostez votre productivité. Rejoignez des milliers d'apprenants sur ExcelWorkflow."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: ExcelWorkflow
    images:
      - url: '~/assets/images/hero-image.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@excelworkflow'
    site: '@excelworkflow'
    cardType: summary_large_image

i18n:
  language: fr
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'dark'
